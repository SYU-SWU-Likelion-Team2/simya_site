<!doctype html>
{% load static %}
<!--
 * write.html
 * Description : 글쓰기 - 감정 입력
 * Author       : 배서현
 * Contributors : Codex
 * Created      : 2026-05-23
 * Last Update  : 2026-05-30
 * Revision History
 *   v1.0.0 - 정적 프론트 화면 제작 (2026-05-23 : 배서현)
 *   v1.1.0 - Figma 기준 UI/상호작용 반영 (2026-05-26 : Codex)
 *   v1.2.0 - Django MTV 템플릿 연결 준비 및 백엔드 인수인계 주석 정리 (2026-05-30 : Codex)
 * Frontend responsibilities
 * - 사용자의 글 내용을 입력받고 글자 수를 표시한 뒤 장작 선택 화면으로 넘깁니다.
 * Frontend -> Backend values
 * - copy, draftUpdatedAt. Django 전환 시 session draft 또는 POST body로 전달합니다.
 * Backend -> Frontend values
 * - draftId(optional), maxLength, validation errors.
 * Backend responsibilities
 * - tonight:write view에서 초안 저장/검증을 처리하고, 장작 선택 전 copy를 session 또는 hidden form으로 보존합니다.
 * Django MTV notes
 * - Django에서는 pages/tonight/write.html로 사용하며 다음 단계는 tonight:firewood URL을 사용합니다.
--><html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIMYA - 내 밤 남기기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'simya/css/common.css' %}" />
    <link rel="stylesheet" href="{% static 'simya/css/tonight.css' %}" />
  </head>
  <body class="simya-page">
    <main class="simya-screen tonight-screen tonight-flow-screen">
      <div class="screen-dim tonight-flow-dim" aria-hidden="true"></div>
      <header class="flow-topbar">
        <p class="flow-brand">SIMYA</p>
        <p class="flow-note">내 밤 이야기</p>
        <span class="flow-divider" aria-hidden="true"></span>
      </header>

      <h1 class="flow-title">내 밤 남기기</h1>
      <p class="flow-subtitle">닉네임 없이 익명의 밤으로 보여요</p>

      <form method="post">
  {% csrf_token %}

  <label class="emotion-editor">
    <span class="sr-only">지금 마음 남기기</span>

    <textarea
      name="content"
      maxlength="700"
      data-emotion-input
      placeholder="지금 마음을 조용히 놓아보세요.&#10;정리되지 않은 문장이어도 괜찮아요."
    ></textarea>

    <span class="emotion-count">
      <b data-emotion-count>0</b> / 700
    </span>
  </label>

  <aside class="tone-guard">
    <h2>감정에 가까운 문장</h2>
    <p>비난이나 평가보다 지금 느끼는 마음을 중심으로 남겨요.</p>
  </aside>

  <nav class="compose-actions">
    <a class="compose-prev" href="{% url 'tonight:index' %}">
      이전
    </a>

    <button type="submit" class="compose-next">
      다음
    </button>
  </nav>

</form>
    </main>
    <script>
      window.SIMYA_ROUTES = {
        tonightIndex: "{% url 'tonight:index' %}",
        tonightWrite: "{% url 'tonight:write' %}",
        tonightFirewood: "{% url 'tonight:firewood' %}",
        tonightDetail: "/tonight/detail/",
        tonightEdit: "/tonight/edit/",
        tonightComments: "/tonight/comments/",
        tonightReaction: "/tonight/reaction/"
};
    </script>
    <script src="{% static 'simya/js/tonight.js' %}"></script>
  </body>
</html>
