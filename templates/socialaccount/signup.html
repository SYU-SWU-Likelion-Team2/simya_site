<!doctype html>
{% load static %}
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIMYA - 회원가입</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'simya/css/onboarding.css' %}" />
  </head>
  <body>
    <main class="onboarding-wrapper auth-signup">
      <div class="slide active">
        <div class="top-bar">
          <span class="time">--:--</span>
          <span class="logo">SIMYA</span>
        </div>
        <form class="auth-form" method="POST">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="auth-submit" type="submit">가입하기</button>
        </form>
      </div>
    </main>
  </body>
</html>
