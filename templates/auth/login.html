<!doctype html>
{% load static %}
<!--
 * login.html
 * Description : 로그인 화면
 * Author       : 배서현
 * Contributors : Codex
 * Created      : 2026-05-23
 * Last Update  : 2026-05-30
 * Revision History
 *   v1.0.0 - 정적 프론트 화면 제작 (2026-05-23 : 배서현)
 *   v1.1.0 - Figma 기준 UI/상호작용 반영 (2026-05-26 : Codex)
 *   v1.2.0 - Django MTV 템플릿 연결 준비 및 백엔드 인수인계 주석 정리 (2026-05-30 : Codex)
 * Frontend responsibilities
 * - 로그인 ID/비밀번호 입력 UI와 회원가입 이동 링크를 제공합니다.
 * Frontend -> Backend values
 * - loginId, password, rememberMe(optional), next(optional).
 * Backend -> Frontend values
 * - userId, nickname, accessToken/sessionId 또는 form error messages.
 * Backend responsibilities
 * - accounts:login view에서 인증, 세션 생성, 실패 시 오류 context 반환, 성공 시 tonight:index로 redirect를 처리합니다.
 * Django MTV notes
 * - Django에서는 pages/auth/login.html로 사용하며 POST 전환 시 csrf_token과 form action을 accounts:login에 연결합니다.
--><html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIMYA - 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'simya/css/onboarding.css' %}" />
  </head>
  <body>
    <main class="onboarding-wrapper auth-login">
      <div class="slide active">
        <div class="top-bar">
          <span class="time">--:--</span>
          <span class="logo">SIMYA</span>
        </div>
        <form class="auth-form" method="POST" action="{% url 'accounts:login' %}">
            {% csrf_token %}
          <h1 class="auth-title">다시,<br />심야에 들어갈까요?</h1>
          <p class="auth-copy">
            조용한 밤에 남겨둔 마음을<br />아이디로 다시 불러와요.
          </p>

          <section class="auth-panel" aria-label="로그인">
            <h2>로그인</h2>

            {% if error %}
              <p class="auth-error">{{ error }}</p>
            {% else %}
              <p class="auth-default-info">아이디와 비밀번호로 심야에 들어가요.</p>
            {% endif %}

            <div class="auth-field field-id">
              <label for="login-id">아이디</label>
              <input
                id="login-id"
                name="loginId"
                type="text"
                placeholder="아이디를 입력해주세요"
                required
              />
            </div>

            <div class="auth-field field-password">
              <label for="login-password">비밀번호</label>
              <input
                id="login-password"
                name="password"
                type="password"
                placeholder="비밀번호를 입력해주세요"
                required
              />
              <button
                class="auth-toggle-password"
                type="button"
                data-toggle-password
              >
                숨김
              </button>
            </div>

            <button class="auth-submit" type="submit">로그인</button>
            <a class="auth-link" href="{% url 'accounts:signup' %}"
              >아직 계정이 없어요&nbsp;&nbsp;·&nbsp;&nbsp;회원가입</a
            >
          </section>
        </form>
      </div>
    </main>
    <script>
      window.SIMYA_ROUTES = {
        authLogin: "{% url 'accounts:login' %}",
        authSignup: "{% url 'accounts:signup' %}",
        tonightIndex: "{% url 'tonight:index' %}"
      };
    </script>
    <script src="{% static 'simya/js/onboarding.js' %}"></script>
  </body>
</html>
